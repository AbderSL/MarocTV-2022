<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشاهدة القناة</title>

<style>
  body {
    margin: 0;
    background-color: #000;
    color: #fff;
    font-family: "Arial", sans-serif;
    text-align: center;
  }

  header {
    background: #222;
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  header img {
    width: 36px;
    height: 36px;
    border-radius: 8px;
  }

  header h1 {
    font-size: 16px;
    margin: 0;
  }

  video {
    width: 100%;
    height: auto;
    background: #000;
  }

  .live {
    position: absolute;
    top: 12px;
    left: 12px;
    background: red;
    color: white;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
  }

  .container {
    position: relative;
  }
</style>
</head>
<body>

<header>
  <img id="logo" src="https://AbderSL.github.io/MarocTV-2022/LOGO/1.jpg" alt="logo">
  <h1 id="title">القناة </h1>
</header>

<div class="container">
  <span class="live">LIVE</span>
  <video id="video" controls autoplay playsinline></video>
</div>

<script>
  // رابط البث
  const STREAM_URL = "https://stream-lb.livemediama.com/alaoula/hls/stream_3/playlist.m3u8"; // <-- ضع رابط القناة هنا

  const video = document.getElementById("video");

  // في أغلب أجهزة Android الحديثة، HLS يعمل مباشرة داخل WebView أو Chrome
  if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = STREAM_URL;
  } else if (Hls.isSupported()) {
    // في حالة أردت دعم كل الأجهزة أضف مكتبة hls.js هنا
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/npm/hls.js@1.4.8";
    script.onload = () => {
      const hls = new Hls();
      hls.loadSource(STREAM_URL);
      hls.attachMedia(video);
    };
    document.body.appendChild(script);
  } else {
    alert("متصفحك لا يدعم تشغيل هذا البث 😕");
  }
</script>

</body>
</html>
